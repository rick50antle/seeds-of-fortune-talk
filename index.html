let audioCtx = null;
const getAudio = () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
};
const tone = (freq, type, dur, vol) => {
  vol = vol || 0.25;
  try {
    const ctx = getAudio();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
};

// ── Token (single tier, single token) ────────────────────────────────────────
const Token = ({ section, tierIndex, infoMode, active }) => {
  const tier = SECTION_TIERS[section][tierIndex];
  const style = TIER_STYLES[tierIndex];
  const faded   = !active;
  const fixed   = infoMode === 'fixed'  && active;
  const seller  = infoMode === 'seller' && active;
  const neutral = (infoMode === 'none' || infoMode === 'symmetric') && active;

  let bodyColor, strokeColor, badge;
  if (faded)        { bodyColor = '#d1d5db'; strokeColor = '#9ca3af'; badge = null; }
  else if (neutral) { bodyColor = '#9ca3af'; strokeColor = '#6b7280'; badge = '?'; }
  else if (fixed)   { bodyColor = style.body; strokeColor = style.text; badge = '✓'; }
  else              { bodyColor = style.body; strokeColor = style.text; badge = tier.emoji; }

  const valueLabel = section === 'investment'
    ? ('$' + tier.value + 'M')
    : tier.value >= 1000 ? ('$' + (tier.value / 1000) + 'K') : ('$' + tier.value);

  const showLabel = seller || fixed;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, opacity: faded ? 0.18 : 1, transition: 'opacity 0.5s' }}>
      <div style={{
        width: 28, height: 28, borderRadius: '50%', flexShrink: 0,
        backgroundColor: faded ? '#d1d5db' : neutral ? '#6b7280' : style.text,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: badge === '?' ? 17 : 14, color: 'white', fontWeight: 700,
      }}>{badge}</div>
      {renderShape(section, bodyColor, strokeColor, true)}
      {showLabel && (
        <div style={{
          fontSize: 13, fontWeight: 700, color: 'white',
          backgroundColor: style.text,
          padding: '3px 10px', borderRadius: 6, lineHeight: 1.2,
        }}>{tier.label} · {valueLabel}</div>
      )}
      {neutral && (
        <div style={{
          fontSize: 13, fontWeight: 700, color: '#6b7280',
          backgroundColor: '#f3f4f6', padding: '3px 10px', borderRadius: 6, lineHeight: 1.2,
        }}>?</div>
      )}
    </div>
  );
};

  return (
    <div style={{
      backgroundColor: colors.clayLight, borderRadius: 10,
      padding: '20px 16px', marginBottom: 12,
    }}>
      <div style={{
        display: 'flex',
        justifyContent: 'space-around',
        alignItems: 'flex-end',
        gap: 12,
      }}>

          const isActive = activeTiers.includes(ti);
          return (

              active={isActive} />

        })}
      </div>
    </div>
  );
};

// ── Lot Calculation ───────────────────────────────────────────────────────────
const LotCalculation = ({ section, activeTiers, offer }) => {
  const tiers = SECTION_TIERS[section];
  if (!tiers) return null;
  const activeTierObjs = tiers.filter((_, i) => activeTiers.includes(i));
  const totalCount = activeTierObjs.reduce((s, t) => s + t.count, 0);
  const totalValue = activeTierObjs.reduce((s, t) => s + t.value * t.count, 0);
  const avg = totalCount > 0 ? Math.round(totalValue / totalCount) : 0;

  const fmt = v => section === 'investment'
    ? ('$' + v + 'M')
    : v >= 1000 ? ('$' + (v / 1000).toFixed(0) + 'K') : ('$' + v);

  return (
    <div style={{ borderRadius: 10, border: '2px solid ' + colors.clayDark, overflow: 'hidden', marginBottom: 12, backgroundColor: colors.clayLight }}>
      <div style={{ padding: '8px 14px', fontSize: 14, fontWeight: 700, backgroundColor: colors.clay, color: colors.earthDark }}>
        Market Calculation
      </div>
      <div style={{ padding: '12px 14px' }}>
        <table style={{ width: '100%', fontSize: 14, color: colors.earthDark, borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ borderBottom: '1px solid ' + colors.earthLight }}>
              <th style={{ textAlign: 'left',   paddingBottom: 6, fontWeight: 600 }}>Quality</th>
              <th style={{ textAlign: 'center', paddingBottom: 6, fontWeight: 600 }}>In market</th>
              <th style={{ textAlign: 'right',  paddingBottom: 6, fontWeight: 600 }}>Value</th>
            </tr>
          </thead>
          <tbody>
            {tiers.map((tier, i) => {
              const isActive = activeTiers.includes(i);
              const ts = TIER_STYLES[i];
              return (
                <tr key={i} style={{ opacity: isActive ? 1 : 0.3 }}>
                  <td style={{ padding: '6px 0' }}>
                    <span style={{ color: ts.text, fontWeight: 600 }}>{tier.emoji} {tier.label}</span>
                  </td>
                  <td style={{ textAlign: 'center', padding: '6px 0' }}>
                    {isActive ? '✓' : '— walked —'}
                  </td>
                  <td style={{ textAlign: 'right',  padding: '6px 0', fontWeight: 600 }}>{fmt(tier.value)}</td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{ borderTop: '2px solid ' + colors.clay }}>
              <td colSpan={2} style={{ fontWeight: 700, paddingTop: 8, fontSize: 15 }}>Average of remaining</td>
              <td style={{ textAlign: 'right', fontWeight: 800, paddingTop: 8, fontSize: 17, color: colors.primary }}>{fmt(avg)}</td>
            </tr>
          </tfoot>
        </table>
        {offer !== null && offer !== undefined && (
          <div style={{

// ── Spin Experience ($11K offer with BARGAIN/OVERPAID labels) ────────────────
// v4.1 — top-half flip-card panel + listings panel removed (R2). The interactive
// simulation IS the page; the spin lives in the symmetric-ignorance world where
// neither side knows.
const SpinExperience = () => {
  const [drawn, setDrawn] = useState(null);
  const [spinning, setSpinning] = useState(false);
  const [flashIdx, setFlashIdx] = useState(0);
  const [totals, setTotals] = useState(0);
  const [bargainCt, setBargainCt] = useState(0);
  const [overpaidCt, setOverpaidCt] = useState(0);

  const OFFER = 11000;
  const timeoutsRef = useRef([]);
  const clearTimeouts = () => {
    timeoutsRef.current.forEach(id => clearTimeout(id));
    timeoutsRef.current = [];
  };
  useEffect(() => () => clearTimeouts(), []);

  const makeOffer = () => {
    if (spinning) return;
    clearTimeouts();
    setSpinning(true);
    setDrawn(null);

    const finalIdx = Math.floor(Math.random() * 4);
    const delays = [80, 80, 90, 100, 120, 150, 200];
    let cum = 0;

    delays.forEach((d, i) => {
      cum += d;
      const id = setTimeout(() => { setFlashIdx(i % 4); }, cum);
      timeoutsRef.current.push(id);
    });

    const finalId = setTimeout(() => {
      setSpinning(false);
      setDrawn(finalIdx);
      setTotals(t => t + 1);
      // Bargain when value > offer; Overpaid when value < offer; (equal would be fair, not used here)
      if (CAR_TIERS[finalIdx].value > OFFER) setBargainCt(c => c + 1);
      else                                    setOverpaidCt(c => c + 1);
      playSuccessTone();
    }, cum + 80);
    timeoutsRef.current.push(finalId);
  };

  const reset = () => {
    clearTimeouts();
    setDrawn(null);
    setSpinning(false);
    setFlashIdx(0);
    setTotals(0); setBargainCt(0); setOverpaidCt(0);
  };

  const fmtMoney = v => '$' + v.toLocaleString();

  // Result panel
  let resultBg = '#f9fafb', resultBorder = '2px dashed #d1d5db';
  let resultBody = (
    <>
      <div style={{ fontSize: 36, color: '#d1d5db' }}>?</div>
      <div style={{ fontSize: 13, color: '#9ca3af', fontWeight: 600 }}>Make an offer to find out</div>
    </>
  );
  if (spinning) {
    const t = TIER_STYLES[flashIdx];
    resultBg = t.bg; resultBorder = '2px solid ' + t.border;
    resultBody = (
      <>
        <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: t.text, opacity: 0.6 }}>drawing…</div>
        <CarSVG fill={t.body} stroke={t.text} w={90} h={59} />
      </>
    );
  } else if (drawn !== null) {
    const tier = CAR_TIERS[drawn];
    const ts = TIER_STYLES[drawn];
    const delta = tier.value - OFFER; // positive = bargain; negative = overpaid
    const isBargain = delta > 0;
    const verdictBg    = isBargain ? '#f0fdf4' : '#fef2f2';
    const verdictColor = isBargain ? '#15803d' : '#991b1b';
    const verdictText  = isBargain
      ? 'BARGAIN by $' + delta.toLocaleString()
      : 'OVERPAID by $' + Math.abs(delta).toLocaleString();
    // Repair affordability: $20K start - $11K offer = $9K cash left
    const cashLeft = 20000 - OFFER; // 9000
    const repairShort = tier.repair - cashLeft;
    const canFix = repairShort <= 0;
    const fixText = canFix
      ? '✓ Can afford ' + (tier.repair === 0 ? 'no repairs needed' : '$' + tier.repair.toLocaleString() + ' in repairs')
      : '✗ Repairs cost $' + tier.repair.toLocaleString() + ' — short $' + repairShort.toLocaleString();
    resultBg = ts.bg; resultBorder = '2.5px solid ' + ts.border;
    resultBody = (
      <>
        <div style={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: ts.text }}>Seller {String.fromCharCode(65 + drawn)} accepted</div>
        <CarSVG fill={ts.body} stroke={ts.text} w={88} h={58} />
        <div style={{ fontSize: 14, fontWeight: 800, color: ts.text }}>{tier.emoji} {tier.label}</div>
        <div style={{ fontSize: 12, fontWeight: 600, color: ts.text }}>
          You paid {fmtMoney(OFFER)}. Worth <strong>{fmtMoney(tier.value)}</strong>.
        </div>
        <div style={{
          fontSize: 12, fontWeight: 800, padding: '5px 10px', borderRadius: 8,
          backgroundColor: verdictBg, color: verdictColor, textAlign: 'center', lineHeight: 1.4,
          letterSpacing: '0.04em',
        }}>{verdictText}</div>
        <div style={{
          fontSize: 11, fontWeight: 600,
          color: canFix ? '#15803d' : '#991b1b',
          textAlign: 'center', lineHeight: 1.3,
        }}>{fixText}</div>
      </>
    );
  }

  return (
    <div style={{ marginBottom: 14 }}>
      {/* Simulation (formerly bottom; v4.1 stripped the symmetric-ignorance flip-card top half) */}
      <div style={{ background: 'white', borderRadius: 12, border: '2px solid ' + colors.clayLight, padding: 18 }}>
        <div style={{ fontSize: 16, fontWeight: 800, color: colors.primary, marginBottom: 4 }}>Your turn</div>
        <div style={{ fontSize: 13, color: colors.earthDark, marginBottom: 14, lineHeight: 1.5 }}>
          You offer the average — <strong>$11,000</strong>. Every seller accepts. But you only get one car — and <strong>no car is worth exactly $11K to you</strong>. The average is impossible to actually receive.
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, alignItems: 'start' }}>
          {/* Offer + record */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <button onClick={makeOffer} disabled={spinning}
              style={{
                background: spinning ? '#9ca3af' : colors.primary, color: 'white', border: 'none',
                borderRadius: 10, padding: '13px 0', width: '100%',
                fontSize: 15, fontWeight: 700, cursor: spinning ? 'default' : 'pointer',
                fontFamily: 'Inter, sans-serif',
              }}>
              {spinning ? 'Drawing…' : 'Offer $11,000 →'}
            </button>
            <div style={{ padding: '10px 8px', backgroundColor: colors.sand, borderRadius: 10, display: 'flex' }}>
              <div style={{ flex: 1, textAlign: 'center', padding: '0 6px' }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: colors.primary, lineHeight: 1 }}>{totals}</div>
                <div style={{ fontSize: 10, fontWeight: 600, color: colors.earth, marginTop: 2, textTransform: 'uppercase', letterSpacing: '0.04em' }}>Offers</div>
              </div>
              <div style={{ flex: 1, textAlign: 'center', padding: '0 6px', borderLeft: '1.5px solid ' + colors.earthLight }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: colors.success, lineHeight: 1 }}>{bargainCt}</div>
                <div style={{ fontSize: 10, fontWeight: 600, color: colors.earth, marginTop: 2, textTransform: 'uppercase', letterSpacing: '0.04em' }}>Bargain</div>
              </div>
              <div style={{ flex: 1, textAlign: 'center', padding: '0 6px', borderLeft: '1.5px solid ' + colors.earthLight }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: colors.error, lineHeight: 1 }}>{overpaidCt}</div>
                <div style={{ fontSize: 10, fontWeight: 600, color: colors.earth, marginTop: 2, textTransform: 'uppercase', letterSpacing: '0.04em' }}>Overpaid</div>
              </div>
            </div>
          </div>

          {/* Result */}
          <div style={{
            minHeight: 210, borderRadius: 12,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            gap: 6, padding: '12px 10px',
            background: resultBg, border: resultBorder,
            transition: 'background 0.3s, border-color 0.3s',
          }}>
            {resultBody}
          </div>
        </div>

        {/* Reset */}
        <div style={{ textAlign: 'center', marginTop: 12 }}>
          <button onClick={reset} style={{
            background: 'none', border: '1.5px solid ' + colors.clay, color: colors.earth,
            borderRadius: 8, padding: '6px 16px', fontSize: 12, fontWeight: 600,
            cursor: 'pointer', fontFamily: 'Inter, sans-serif',
          }}>↺ Start over</button>
        </div>
      </div>
    </div>
  );
};

          fontSize: 13, color: colors.earth, fontStyle: 'italic',

            <div key={r.idx} style={{
              ...reveal(rowVisible(i)),

                <CarSVG fill={ts.body} stroke={ts.text} w={56} h={37} />
                <div style={{
                  fontSize: 13, fontWeight: 700, padding: '3px 11px', borderRadius: 99,
                  backgroundColor: ts.bg, color: ts.text, border: '1.5px solid ' + ts.border,

                  <strong>{r.fix.text}</strong> · <span style={{ fontWeight: 600 }}>{r.fix.extra}</span>

      </div>

      {/* Summary panel — beat 6 */}
      <div style={{
        ...reveal(beat >= 6),
        background: colors.primary, borderRadius: 12, padding: '18px 20px', color: 'white',
      }}>
        <div style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: 'rgba(255,255,255,0.7)', marginBottom: 14 }}>

          <div style={{ textAlign: 'center', padding: '0 10px', borderLeft: '1px solid rgba(255,255,255,0.2)' }}>

          <div style={{ textAlign: 'center', padding: '0 10px', borderLeft: '1px solid rgba(255,255,255,0.2)' }}>

          The math is fair. The lived experience is not.

      </div>

      {/* Beat indicator + click hint */}
      <div style={{
        marginTop: 14, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
      }}>
        <div style={{ display: 'flex', gap: 5 }}>
          {[1, 2, 3, 4, 5, 6].map(n => (
            <span key={n} style={{
              width: 7, height: 7, borderRadius: '50%',

              transition: 'background-color 0.3s',

// ── formatEmphasis helper (v4.2 fix) ─────────────────────────────────────────
// Narrative/insight/FixCard.body strings may contain markdown-style emphasis:
// *text* → <em>text</em>, **text** → <strong>text</strong>. The render slots
// otherwise interpolate raw strings, so without this helper the asterisks would
// show up literally. Bold must be matched before italic to avoid mis-pairing.
const formatEmphasis = (s) => {
  if (!s || typeof s !== 'string') return s;
  if (!s.includes('*')) return s;
  const parts = [];
  let i = 0, key = 0;
  const re = /\*\*([^*]+)\*\*|\*([^*]+)\*/g;
  let m;
  while ((m = re.exec(s)) !== null) {
    if (m.index > i) parts.push(s.slice(i, m.index));
    if (m[1] != null) parts.push(<strong key={'k' + (key++)}>{m[1]}</strong>);
    else              parts.push(<em     key={'k' + (key++)}>{m[2]}</em>);
    i = m.index + m[0].length;
  }
  if (i < s.length) parts.push(s.slice(i));
  return parts;
};

// ── Spiral Badge ──────────────────────────────────────────────────────────────
const SpiralBadge = () => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: 14, borderRadius: 10, marginBottom: 12, backgroundColor: colors.errorBg, borderLeft: '4px solid ' + colors.error }}>
    <span style={{ fontSize: 26 }}>📉</span>
    <div>
      <div style={{ fontSize: 15, fontWeight: 700, color: colors.error }}>Adverse selection cascade</div>
      <div style={{ fontSize: 12, color: '#991b1b', marginTop: 2 }}>Quality exits → average falls → next-best quality exits → …</div>
    </div>
  </div>
);

// ── Main App ──────────────────────────────────────────────────────────────────
const TutorialApp = () => {
  const [idx, setIdx]               = useState(0);
  const [devMode, setDevMode]       = useState(false);
  const [clickCount, setClickCount] = useState(0);
  // v4.3 — speaker notes toggle. Narrative boxes are Rick's spoken script, hidden by default
  // so students see clean visuals + headline + insight only. Initialized from ?notes=1 URL param
  // and toggleable from the 📝 button in the header.
  const [showNotes, setShowNotes]   = useState(() => {
    if (typeof window === 'undefined') return false;
    return new URLSearchParams(window.location.search).get('notes') === '1';
  });

  const step    = STEPS[idx];
  const isFirst = idx === 0;
  const isLast  = idx === STEPS.length - 1;
  const progress = Math.round((idx / (STEPS.length - 1)) * 100);

  const go = (i) => { playContinueClick(); setIdx(i); window.scrollTo(0, 0); };
  const next    = () => { if (!isLast)  go(idx + 1); };
  const prev    = () => { if (!isFirst) go(idx - 1); };
  const restart = () => { playContinueClick(); setIdx(0); window.scrollTo(0, 0); };

  const headerClick = () => {
    const n = clickCount + 1;
    setClickCount(n);
    if (n >= 3) { setDevMode(d => !d); setClickCount(0); }
  };

  const SECTION_COLORS = {
    car:        { bg: '#dbeafe', text: '#1e40af', dot: '#3b82f6' },
    phone:      { bg: '#fce7f3', text: '#9d174d', dot: '#ec4899' },
    investment: { bg: '#d1fae5', text: '#065f46', dot: '#22c55e' },
    closing:    { bg: '#fef3c7', text: '#92400e', dot: '#c9a227' },
    concept:    { bg: '#f5f3ff', text: '#5b21b6', dot: '#7c3aed' },
    pivot:      { bg: '#fef3c7', text: '#92400e', dot: '#f59e0b' },
  };
  const sc = SECTION_COLORS[step.section] || SECTION_COLORS.closing;

  // Resolve a "render section" for components that need car/phone/investment data.
  // Steps 11 (concept) and 13 (pivot) are bespoke kinds that don't need this.
  const renderSection = step.section === 'concept' || step.section === 'pivot'
    ? 'car'  // unused for these kinds, just a safe default
    : step.section;

  return (
    <div style={{ minHeight: '100vh', backgroundColor: colors.sand }}>
      <div style={{ maxWidth: 720, margin: '0 auto', padding: '16px 16px 48px' }}>

        {/* Header */}
        <div style={{ borderRadius: 12, padding: 16, marginBottom: 16, backgroundColor: colors.primary }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div onClick={headerClick} style={{ cursor: 'pointer' }}>
              <h1 style={{ fontSize: 18, fontWeight: 700, color: 'white', lineHeight: 1.3, margin: 0 }}>
                Markets &amp; Information
              </h1>
              <p style={{ fontSize: 13, marginTop: 3, color: colors.earthLight, margin: '3px 0 0' }}>
                Seeds of Fortune &middot; Yale &middot; May 4, 2026
              </p>
            </div>
            <div style={{ display: 'flex', gap: 2, alignItems: 'center' }}>
              <button onClick={() => setShowNotes(s => !s)}
                title={showNotes ? 'Hide speaker notes' : 'Show speaker notes'}
                aria-label="Toggle speaker notes" aria-pressed={showNotes}
                style={{
                  fontSize: 16, background: 'none', border: 'none', cursor: 'pointer', padding: 6, lineHeight: 1,
                  opacity: showNotes ? 1 : 0.55, filter: showNotes ? 'none' : 'grayscale(0.6)',
                }}>
                &#128221;
              </button>
              <button onClick={restart} title="Restart" aria-label="Restart"
                style={{ fontSize: 22, color: 'white', background: 'none', border: 'none', cursor: 'pointer', padding: 6, lineHeight: 1 }}>
                &#8635;
              </button>
            </div>
          </div>

          <div style={{ marginTop: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: 'rgba(255,255,255,0.7)', marginBottom: 4 }}>
              <span>Step {idx + 1} of {STEPS.length} &middot; <span style={{ opacity: 0.7 }}>{step.id}</span></span>
              <span>{progress}%</span>
            </div>
            <div style={{ height: 7, borderRadius: 99, backgroundColor: 'rgba(255,255,255,0.2)' }}
              role="progressbar" aria-valuenow={progress} aria-valuemin={0} aria-valuemax={100}>
              <div style={{ height: '100%', borderRadius: 99, backgroundColor: colors.accent, width: progress + '%', transition: 'width 0.4s' }} />
            </div>
          </div>

          {devMode && (
            <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid rgba(255,255,255,0.2)' }}>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.6)', marginBottom: 6 }}>Dev: jump to step</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                {STEPS.map((s, i) => (
                  <button key={i} onClick={() => go(i)}
                    style={{
                      padding: '3px 9px', borderRadius: 4, fontSize: 11, border: 'none', cursor: 'pointer',
                      backgroundColor: i === idx ? 'white' : 'rgba(255,255,255,0.2)',
                      color: i === idx ? colors.primary : 'white',
                      fontWeight: i === idx ? 700 : 500,
                    }}>{s.id}</button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Section label */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <span style={{ padding: '5px 14px', borderRadius: 99, fontSize: 13, fontWeight: 700, backgroundColor: sc.bg, color: sc.text }}>
            {step.sectionLabel}
          </span>
          <span style={{ fontSize: 12, color: colors.earth, fontWeight: 500 }}>{idx + 1} / {STEPS.length}</span>
        </div>

        {/* Headline */}
        <h2 style={{
          fontSize: step.kind === 'abstraction' ? 20 : 24,
          fontWeight: 700, color: colors.primary, marginBottom: 14, lineHeight: 1.3,
          // Hide headline for slides that ARE the headline — abstraction (c12),
          // rule-change precursor (c5b), and synthesis (NEW). These build their
          // own typography and the App-level headline would compete with the
          // typography inside.
          display: (step.kind === 'abstraction' || step.kind === 'ruleChange' || step.kind === 'synthesis' || step.kind === 'growthWedge') ? 'none' : 'block',
        }}>
          {step.headline}
        </h2>

        {/* Narrative — early position when narrativeFirst is set (R3 c6: reasoning precedes the visual).
            v4.3: gated on showNotes — narrative is the speaker script, hidden from students by default. */}
        {showNotes && step.narrativeFirst && step.narrative && step.kind !== 'abstraction' && step.kind !== 'synthesis' && step.kind !== 'growthWedge' && (
          <div style={{
            padding: 16, borderRadius: 10, marginBottom: 12,
            backgroundColor: colors.sand, borderLeft: '4px solid ' + colors.accent,
            fontStyle: 'italic', fontSize: 15, color: '#374151', lineHeight: 1.65,
          }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, color: colors.earth, marginBottom: 6, fontStyle: 'normal' }}>
              &#128221; SCRIPT
            </div>
            {formatEmphasis(step.narrative)}
          </div>
        )}

        {/* Per-step content (kind dispatcher) */}
        {step.kind === 'hook'        && <HookSlide />}
        {step.kind === 'population'  && <PopulationView />}
        {step.kind === 'listings'    && <MarketplaceView />}
        {step.kind === 'spin'        && <SpinExperience />}
        {step.kind === 'lossViz'     && <LossVisualization />}
        {step.kind === 'frozen'      && <FrozenMarketView />}
        {step.kind === 'concept'     && <ConceptCard />}
        {step.kind === 'productiveConcept' && <ProductiveEfficiencyCard />}
        {step.kind === 'abstraction' && <AbstractionSlide />}
        {step.kind === 'ruleChange'  && <RuleChangeSlide />}
        {step.kind === 'cascade'     && <CascadeSlide />}
        {step.kind === 'cascadeRevision' && <CascadeRevisionSlide />}
        {/* v4.5.1 — key={step.id} forces remount between p0 and i0. Both use
             the same UnraveledMarketView component, so without a key React
             reuses the instance and the beat state from p0 (which the user
             clicked to 4) carries into i0, making the whole slide appear at
             once instead of requiring click-through. The key resets state. */}
        {step.kind === 'unraveled'   && <UnraveledMarketView key={step.id} section={step.section} preamble={step.preamble} conclusion={step.conclusion} />}
        {step.kind === 'synthesis'   && <SynthesisSlide />}
        {step.kind === 'combinedFixes' && <CombinedFixesSlide />}
        {step.kind === 'investmentFixes' && <InvestmentFixesSlide />}
        {step.kind === 'growthWedge' && <GrowthWedgeSlide />}
        {step.kind === 'morePlaces'  && <MorePlacesSlide key={step.id} />}

        {/* Standard cascade content for steps without a kind, scoped to
             car/phone/investment. v4.5.4 — ModeBar removed: c3 is the only
             step that falls into this branch, and the symmetric/asymmetric/
             fixed pill row at the bottom is clutter on a slide whose job is
             just to show the symmetric-ignorance baseline. */}
        {!step.kind && (step.section === 'car' || step.section === 'phone' || step.section === 'investment') && (
          <>
            <TokenGrid section={renderSection} activeTiers={step.activeTiers} infoMode={step.infoMode} />
            {step.showSpiral && <SpiralBadge />}
            {step.showCalc   && <LotCalculation section={renderSection} activeTiers={step.activeTiers} offer={step.offer} />}
            {step.showFix    && <FixCard section={renderSection} />}
            {/* v4.2 R17 — crises beat appended below the FixCard on i0 */}
            {step.crisesBeat && <CrisisCallout />}
          </>
        )}

        {/* Closing content — z1 only (z0 cost-escalation slide removed in v4.2 R16) */}
        {step.section === 'closing' && (
          <>
            {step.showCapstone && <CapstoneConnections />}
          </>
        )}

        {/* Narrative — default (post-visual) position. Suppressed on abstraction slide (R8: the slide IS the slide) and skipped if already shown above (R3).
            v4.3: gated on showNotes — narrative is the speaker script, hidden from students by default. */}
        {showNotes && !step.narrativeFirst && step.kind !== 'abstraction' && step.kind !== 'synthesis' && step.kind !== 'growthWedge' && step.narrative && (
          <div style={{
            padding: 16, borderRadius: 10, marginBottom: 12,
            backgroundColor: colors.sand, borderLeft: '4px solid ' + colors.accent,
            fontStyle: 'italic', fontSize: 15, color: '#374151', lineHeight: 1.65,
          }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, color: colors.earth, marginBottom: 6, fontStyle: 'normal' }}>
              &#128221; SCRIPT
            </div>
            {formatEmphasis(step.narrative)}
          </div>
        )}

        {/* Insight */}
        {step.insight && (
          <div style={{
            padding: 14, borderRadius: 10, border: '2px solid ' + colors.accent,
            backgroundColor: '#fef9e7', marginBottom: 12,
            display: 'flex', gap: 12, alignItems: 'flex-start',
          }}>
            <span style={{ fontSize: 20, color: colors.accent, flexShrink: 0, marginTop: 1 }}>💡</span>
            <div style={{ fontSize: 14, color: colors.earthDark, lineHeight: 1.6 }}>{formatEmphasis(step.insight)}</div>
          </div>
        )}

        {/* Closing coda — only on z1 (last step). v4.5.3: reworked to invoke
             the scale insight as the final frame. Replaces "Wherever you find
             an information problem" with the scale-conditional version: it's
             the markets that have outgrown shared experience that need this
             pattern named. Closes on TRUST as the through-line. */}
        {step.id === 'z1' && (
          <div style={{ padding: 22, borderRadius: 10, textAlign: 'center', backgroundColor: colors.primary, marginBottom: 12 }}>
            <p style={{ color: 'white', fontWeight: 700, fontSize: 17, margin: 0 }}>
              Wherever a market has outgrown shared experience,
            </p>
            <p style={{ color: colors.earthLight, fontSize: 14, marginTop: 8, margin: '8px 0 0' }}>
              you'll find an information problem — and a place where <strong style={{ color: colors.accent }}>trust</strong> can be rebuilt.
            </p>
          </div>
        )}

        {/* Navigation */}
        <div style={{ display: 'flex', gap: 12, marginTop: 18 }}>
          <button onClick={prev} disabled={isFirst} aria-label="Previous step"
            style={{
              flex: 1, padding: '14px 0', borderRadius: 10, fontWeight: 700, fontSize: 15,
              backgroundColor: isFirst ? '#e5e7eb' : 'white',
              color: isFirst ? '#9ca3af' : colors.primary,
              border: '2px solid ' + (isFirst ? '#e5e7eb' : colors.primary),
              cursor: isFirst ? 'not-allowed' : 'pointer',
            }}>← Back</button>
          <button onClick={next} disabled={isLast} aria-label="Next step"
            style={{
              flex: 1, padding: '14px 0', borderRadius: 10, fontWeight: 700, fontSize: 15,
              backgroundColor: isLast ? '#e5e7eb' : colors.primary,
              color: isLast ? '#9ca3af' : 'white',
              border: 'none', cursor: isLast ? 'not-allowed' : 'pointer',
            }}>{isLast ? '✓ Complete' : 'Next →'}</button>
        </div>

        {/* Step dots */}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 5, marginTop: 16, flexWrap: 'wrap' }}>
          {STEPS.map((s, i) => {
            const dc = SECTION_COLORS[s.section] || SECTION_COLORS.closing;
            const active = i === idx;
            const past   = i < idx;
            return (
              <button key={i} onClick={() => go(i)} aria-label={'Step ' + (i + 1) + ': ' + s.headline}
                title={s.id + ' — ' + s.headline}
                style={{
                  width: active ? 14 : 10, height: active ? 14 : 10,
                  borderRadius: '50%', border: 'none', cursor: 'pointer', padding: 0, flexShrink: 0,
                  backgroundColor: active ? dc.dot : past ? colors.earthLight : '#e5e7eb',
                  transition: 'all 0.2s',
                }} />
            );
          })}
        </div>

      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(TutorialApp));
</script>
</body>
</html>
